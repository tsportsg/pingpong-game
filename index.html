.header{text-align:center;padding:32px 16px 16px;background:linear-gradient(180deg,rgba(59,130,246,0.12)0%,rgba(59,130,246,0.03)60%,transparent 100%);position:relative}
.header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);border-radius:1px}
.header h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,#F8FAFC,#CBD5E1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;line-height:1.3}
.header .subtitle{font-size:13px;color:var(--primary);margin-top:6px;letter-spacing:1px;font-weight:500}
.header .tagline{font-size:14px;color:var(--text-dim);margin-top:8px;font-weight:400;letter-spacing:0.5px}
.header .event-badge{display:inline-block;margin-top:10px;padding:4px 12px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);border-radius:20px;font-size:10px;color:var(--primary);font-weight:600}

.screen{display:none}.screen.active{display:block}

.gender-toggle{display:flex;justify-content:center;gap:12px;padding:12px 16px}
.gender-btn{padding:8px 24px;border-radius:20px;border:1px solid var(--card-border);background:var(--card);color:var(--text-dim);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
.gender-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 16px var(--primary-glow)}

.section-title{font-size:14px;font-weight:700;padding:14px 16px 6px;color:var(--text)}
.section-hint{font-size:11px;color:var(--text-muted);padding:0 16px 8px}

/* Team grid */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:4px 16px}
.team-card{background:var(--card);border:1.5px solid var(--card-border);border-radius:12px;padding:12px 6px;cursor:pointer;transition:all .3s;text-align:center}
.team-card:hover{border-color:rgba(59,130,246,0.3);background:var(--card-hover)}
.team-card.selected{border-color:var(--primary);background:rgba(59,130,246,0.1);transform:translateY(-2px);box-shadow:0 4px 20px var(--primary-glow)}
.team-card.selected-opp{border-color:var(--accent);background:rgba(245,158,11,0.08);transform:translateY(-2px);box-shadow:0 4px 20px var(--accent-glow)}
.team-card .flag{font-size:28px}
.team-card .name{font-size:13px;font-weight:700;margin-top:3px}
.team-card .seed{font-size:10px;color:var(--text-muted);margin-top:1px}

/* Matchup display */
.matchup-header{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 16px}
.team-badge{text-align:center}
.team-badge .flag{font-size:32px}
.team-badge .name{font-size:13px;font-weight:700;margin-top:2px}
.vs-text{font-size:18px;font-weight:900;color:var(--accent)}

.rule-hint{text-align:center;padding:8px 16px;font-size:11px;color:var(--text-dim);background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.1);border-radius:10px;margin:0 16px 10px;line-height:1.6}

/* Slots */
.slots-container{padding:0 16px}
.match-slot{background:var(--card);border:1px solid var(--card-border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.slot-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--card-border)}
.slot-round{font-size:11px;font-weight:700;color:var(--accent)}
.slot-vs-label{font-size:11px;color:var(--text-muted)}
.slot-body{display:flex;align-items:center;padding:10px 12px;gap:8px}
.slot-player{flex:1;text-align:center}
.slot-player .player-name{font-size:13px;font-weight:700}
.slot-player .player-rank{font-size:10px;color:var(--text-muted)}
.slot-vs{font-size:13px;font-weight:900;color:var(--text-muted);flex-shrink:0}

.slot-select-btn{flex:1;text-align:center;padding:8px;border:1.5px dashed rgba(148,163,184,0.2);border-radius:8px;color:var(--text-muted);cursor:pointer;transition:all .3s;font-size:12px}
.slot-select-btn:hover{border-color:var(--primary);color:var(--primary)}
.slot-select-btn.filled{border-style:solid;border-color:var(--win);background:rgba(34,197,94,0.08);color:var(--win)}
.slot-hidden{flex:1;text-align:center;padding:8px;background:var(--surface);border-radius:8px;font-size:12px;color:var(--text-muted)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-content{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:60vh;padding:16px;overflow-y:auto;animation:slideUp .3s ease;border-top:1px solid var(--card-border)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:10px;text-align:center}
.player-option{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border:1px solid var(--card-border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.player-option:hover{background:rgba(59,130,246,0.08);border-color:rgba(59,130,246,0.3)}
.player-option.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.player-option .p-info{display:flex;flex-direction:column}
.player-option .p-name{font-size:13px;font-weight:700}
.player-option .p-meta{font-size:10px;color:var(--text-muted);margin-top:1px}
.player-option .p-rating{font-size:12px;font-weight:700;color:var(--accent)}

/* Action */
.action-bar{padding:12px 16px;position:sticky;bottom:0;background:linear-gradient(0deg,var(--bg)60%,transparent 100%)}
.btn-primary{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 24px var(--primary-glow)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{width:100%;padding:10px;border-radius:10px;border:1px solid var(--card-border);background:var(--card);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s}
.btn-secondary:hover{background:var(--card-hover);border-color:rgba(148,163,184,0.25)}

/* Simulation */
.sim-container{padding:16px}
.sim-scoreboard{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px;background:var(--card);border-radius:14px;margin:0 16px 12px;border:1px solid var(--card-border)}
.sim-team{text-align:center}
.sim-team .flag{font-size:32px}
.sim-team .name{font-size:12px;font-weight:700;margin-top:2px}
.sim-score{font-size:42px;font-weight:900;letter-spacing:4px}
.sim-score .colon{color:var(--text-muted);margin:0 4px}
.score-home{color:var(--primary)}.score-away{color:var(--accent)}

.sim-match-list{padding:0 16px}
.sim-match-item{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--card-border);opacity:.3;transform:translateY(10px);transition:all .5s}
.sim-match-item.revealed{opacity:1;transform:translateY(0)}
.sim-match-item.win{border-left:3px solid var(--win)}
.sim-match-item.lose{border-left:3px solid var(--lose)}
.sim-match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sim-match-round{font-size:11px;color:var(--accent);font-weight:700}
.sim-match-result{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.sim-match-result.win{background:rgba(34,197,94,0.15);color:var(--win)}
.sim-match-result.lose{background:rgba(239,68,68,0.15);color:var(--lose)}
.sim-match-players{display:flex;align-items:center;justify-content:space-between}
.sim-p{flex:1;text-align:center}
.sim-p .name{font-size:13px;font-weight:700}
.sim-p .detail-score{font-size:11px;color:var(--text-muted);margin-top:2px}
.sim-p-vs{font-size:11px;color:var(--text-muted);flex-shrink:0;padding:0 6px}

/* Result */
.result-banner{text-align:center;padding:24px 16px 16px}
.result-emoji{font-size:50px}
.result-title{font-size:22px;font-weight:900;margin-top:10px}
.result-sub{font-size:13px;color:var(--text-dim);margin-top:4px}
.result-title.win{color:var(--accent)}.result-title.lose{color:var(--text-muted)}

.share-card{margin:12px 16px;padding:16px;background:linear-gradient(135deg,var(--card),var(--card-hover));border:1px solid var(--card-border);border-radius:14px}
.share-card-header{text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:10px}
.share-lineup{display:flex;flex-direction:column;gap:4px}
.share-lineup-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--surface)}
.share-lineup-row .round{color:var(--accent);font-weight:700;width:44px}
.share-lineup-row .players{flex:1;text-align:center}
.share-lineup-row .result-tag{width:36px;text-align:right;font-weight:700}
.share-lineup-row .result-tag.w{color:var(--win)}
.share-lineup-row .result-tag.l{color:var(--lose)}

.btn-group{display:flex;gap:8px;padding:0 16px 12px}
.btn-group .btn-primary,.btn-group .btn-secondary{flex:1}

/* Reveal animation */
.opp-reveal{text-align:center;padding:16px;margin:0 16px 12px;background:var(--card);border-radius:12px;border:1px solid var(--card-border)}
.opp-reveal h3{font-size:14px;color:var(--accent);margin-bottom:10px}
.opp-reveal-list{display:flex;flex-direction:column;gap:6px}
.opp-reveal-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface);border-radius:6px;font-size:12px;animation:fadeIn .5s ease forwards;opacity:0}
.opp-reveal-item .pos{color:var(--accent);font-weight:700;width:30px}
.opp-reveal-item .pname{flex:1;font-weight:600}
.opp-reveal-item .prank{color:var(--text-muted);font-size:11px}
@keyframes fadeIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}.pulse{animation:pulse .6s ease}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confetti 1.5s ease forwards;z-index:200;pointer-events:none}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}

@media(max-width:400px){.header h1{font-size:24px}.header .tagline{font-size:12px}.team-grid{grid-template-columns:repeat(3,1fr);gap:6px}.team-card{padding:10px 4px}.team-card .flag{font-size:24px}}

/* Bottom search bar - 腾讯体育引导（参考B站/虎扑胶囊样式） */
.app-search-bar{position:relative;width:100%;margin-top:auto;padding:24px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.app-search-wrapper{width:100%;max-width:380px;padding:10px 12px;border:1.5px solid rgba(255,255,255,0.2);border-radius:28px;background:rgba(255,255,255,0.04)}
.app-capsule{display:flex;align-items:stretch;width:100%;border-radius:22px;overflow:hidden;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.3);border:none}
.app-capsule:active{transform:scale(0.98);opacity:0.9}
.app-capsule-left{display:flex;align-items:center;gap:6px;padding:10px 14px;background:rgba(255,255,255,0.06);flex-shrink:0}
.app-capsule-left img{height:20px;width:auto}
.app-capsule-right{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.app-capsule-right .kw{font-size:14px;font-weight:700;color:#fff;white-space:nowrap}
.app-capsule-right .search-icon-svg{width:16px;height:16px;opacity:0.8}
.app-search-hint{font-size:11px;color:var(--text-muted);text-align:center;letter-spacing:0.5px}

/* 内容区flex:1撑满，搜索框自然在底部 */
.screen{flex:1}
</style>
</head>
<body>

<!-- ===== SCREEN 1: Choose Teams ===== -->
<div id="screen-choose" class="screen active">
  <div class="header">
    <h1>🏓 乒乒乓乓博弈战</h1>
    <div class="subtitle">2026 伦敦 · 世界乒乓球团体锦标赛</div>
    <div class="tagline">选择你的阵容，来一场"酣畅淋漓"的博弈</div>
  </div>
  <div class="gender-toggle">
    <button class="gender-btn active" onclick="switchGender('men')">🏓 男团</button>
    <button class="gender-btn" onclick="switchGender('women')">🏓 女团</button>
  </div>
  <div class="section-title">① 选择你执教的队伍</div>
  <div id="my-team-list" class="team-grid"></div>
  <div class="section-title" style="margin-top:8px">② 选择对手</div>
  <div class="section-hint">对手的出场阵容赛前保密，比赛时揭晓 🤫</div>
  <div id="opp-team-list" class="team-grid"></div>
  <div class="action-bar">
    <button class="btn-primary" id="btn-start" disabled onclick="goToTactics()">选好两队后开始布阵 →</button>
  </div>
</div>

<!-- ===== SCREEN 2: Tactics ===== -->
<div id="screen-tactics" class="screen">
  <div class="matchup-header">
    <div class="team-badge"><span class="flag" id="my-flag"></span><div class="name" id="my-name"></div></div>
    <div class="vs-text">VS</div>
    <div class="team-badge"><span class="flag" id="opp-flag"></span><div class="name" id="opp-name"></div></div>
  </div>
  <div class="rule-hint">
    🎯 5盘3胜 · 全单打制<br>
    从5人中选3人：A/B各打2盘，C打1盘<br>
    顺序：A-X → B-Y → C-Z → A-Y → B-X<br>
    ⚠️ 对方阵容未知，凭判断排阵！
  </div>
  <div class="section-title">安排你的出场阵容</div>
  <div class="slots-container" id="slots-container"></div>
  <div class="action-bar">
    <button class="btn-primary" id="btn-fight" disabled onclick="startRevealAndSim()">⚔️ 提交阵容，开始比赛</button>
    <button class="btn-secondary" onclick="showScreen('screen-choose')">← 重新选队伍</button>
  </div>
</div>

<!-- ===== Player picker modal ===== -->
<div class="modal-overlay" id="player-modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">选择出战选手</div>
    <div id="player-options"></div>
  </div>
</div>

<!-- ===== SCREEN 3: Reveal + Simulation ===== -->
<div id="screen-sim" class="screen">
  <div class="matchup-header">
    <div class="team-badge"><span class="flag" id="sim-my-flag"></span><div class="name" id="sim-my-name"></div></div>
    <div class="vs-text">VS</div>
    <div class="team-badge"><span class="flag" id="sim-opp-flag"></span><div class="name" id="sim-opp-name"></div></div>
  </div>
  <div id="opp-reveal-box" class="opp-reveal" style="display:none">
    <h3>📢 对方公布出场阵容！</h3>
    <div class="opp-reveal-list" id="opp-reveal-list"></div>
  </div>
  <div class="sim-scoreboard" id="sim-scoreboard" style="display:none">
    <div class="sim-team"><span class="flag" id="sb-my-flag"></span><div class="name" id="sb-my-name"></div></div>
    <div class="sim-score">
      <span class="score-home" id="score-home">0</span>
      <span class="colon">:</span>
      <span class="score-away" id="score-away">0</span>
    </div>
    <div class="sim-team"><span class="flag" id="sb-opp-flag"></span><div class="name" id="sb-opp-name"></div></div>
  </div>
  <div class="sim-match-list" id="sim-match-list"></div>
</div>

<!-- ===== SCREEN 4: Result ===== -->
<div id="screen-result" class="screen">
  <div class="result-banner">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:10px;opacity:0.6">* 比赛结果为随机模拟生成，仅供娱乐，不代表真实赛果</div>
  </div>
  <div class="sim-scoreboard">
    <div class="sim-team"><span class="flag" id="final-my-flag"></span><div class="name" id="final-my-name"></div></div>
    <div class="sim-score">
      <span class="score-home" id="final-score-home">0</span>
      <span class="colon">:</span>
      <span class="score-away" id="final-score-away">0</span>
    </div>
    <div class="sim-team"><span class="flag" id="final-opp-flag"></span><div class="name" id="final-opp-name"></div></div>
  </div>
  <div class="share-card">
    <div class="share-card-header">📋 对阵详情</div>
    <div class="share-lineup" id="share-lineup"></div>
  </div>
  <div class="btn-group">
    <button class="btn-primary" onclick="resetTactics()">🔄 换阵容再来</button>
    <button class="btn-secondary" onclick="resetAll()">🏠 返回首页</button>
  </div>
  <div style="padding:0 16px 60px">
    <button class="btn-secondary" onclick="shareResult()" style="width:100%">📸 复制分享文案</button>
  </div>
</div>

function getH2H(a, b) {
  return H2H[a+'_'+b] || -(H2H[b+'_'+a] || 0);
}

function generateOppLineup() {
  // AI picks 3 from 5, with some randomness to simulate real coaching decisions
  const pool = [...oppTeam.players];
  // Weight by rating, top 3 have highest chance, but occasionally surprise picks
  const weights = pool.map((p,i)=>{
    if(i<3) return 5-i; // 5,4,3 for top 3
    return Math.random()<0.25?2:0.5; // occasionally pick 4th/5th
  });
  const selected = [];
  for(let pick=0;pick<3;pick++){
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total,cum=0;
    for(let j=0;j<pool.length;j++){
      cum+=weights[j];
      if(r<=cum&&!selected.includes(j)){selected.push(j);weights[j]=0;break;}
      if(j===pool.length-1){for(let k=0;k<pool.length;k++){if(!selected.includes(k)){selected.push(k);weights[k]=0;break;}}}
    }
  }
  // Sort selected by rating desc, assign A=strongest position
  const picks = selected.map(i=>pool[i]).sort((a,b)=>b.rating-a.rating);
  // But shuffle positions with some strategy
  const strategies = [
    [0,1,2], // standard: best=A, 2nd=B, 3rd=C
    [1,0,2], // swap A/B
    [0,2,1], // swap B/C
    [2,0,1], // surprise: weakest at A
  ];
  const strat = strategies[Math.floor(Math.random()*strategies.length)];
  oppSlots={X:picks[strat[0]],Y:picks[strat[1]],Z:picks[strat[2]]};
}

function renderSlots() {
  const container=document.getElementById('slots-container');

    {round:'第5盘',my:'B',opp:'X'}

  container.innerHTML=matches.map((m,i)=>{
    const myP=mySlots[m.my];
    const isAuto=(m.my==='A'&&i===3)||(m.my==='B'&&i===4);
    return `
    <div class="match-slot">
      <div class="slot-header">
        <span class="slot-round">${m.round}</span>
        <span class="slot-vs-label">${m.my} vs ${m.opp}</span>
      </div>

            <div class="player-name" style="color:${myP?'var(--win)':'var(--text-muted)'}">${myP?myP.name:'(跟随'+m.my+'位)'}</div>
            <div class="player-rank">${myP?'世界第'+myP.rank:'自动跟随'}</div>

            ${myP?myP.name+'<br><span style="font-size:10px">世界第'+myP.rank+'</span>':'👆 选人 ('+m.my+'位)'}
          </div>
        `}

    </div>`;
  }).join('');
}

function openPicker(slot) {
  window._pickSlot=slot;

  document.getElementById('modal-title').textContent='选择 '+posLabel[slot]+' 选手';
  document.getElementById('player-options').innerHTML=team.players.map(p=>{
    const isUsed=used.includes(p.name)&&(!mySlots[slot]||mySlots[slot].name!==p.name);
    return `
    <div class="player-option ${isUsed?'disabled':''}" onclick="pickPlayer('${p.name}')">
      <div class="p-info">
        <span class="p-name">${p.name}</span>
        <span class="p-meta">世界第${p.rank} · ${p.pts}分</span>
      </div>
      <div class="p-rating">⚡${p.rating}</div>
    </div>`;
  }).join('');
  document.getElementById('player-modal').classList.add('show');
}

function pickPlayer(name) {
  const slot=window._pickSlot;
  const player=myTeam.players.find(p=>p.name===name);
  for(let s in mySlots){if(mySlots[s]&&mySlots[s].name===name&&s!==slot)mySlots[s]=null;}
  mySlots[slot]=player;
  document.getElementById('player-modal').classList.remove('show');
  renderSlots();updateFightBtn();
}

  // Show reveal box

  revealList.innerHTML='';

  const posLabels=[{pos:'X位',player:oppSlots.X},{pos:'Y位',player:oppSlots.Y},{pos:'Z位',player:oppSlots.Z}];
  let ri=0;
  function revealNext() {
    if(ri>=posLabels.length){
      setTimeout(startMatchSim,800);
      return;
    }
    const p=posLabels[ri];
    const div=document.createElement('div');
    div.className='opp-reveal-item';
    div.style.animationDelay=(ri*0.15)+'s';
    div.innerHTML=`<span class="pos">${p.pos}</span><span class="pname">${p.player.name}</span><span class="prank">世界第${p.player.rank}</span>`;
    revealList.appendChild(div);
    ri++;
    setTimeout(revealNext,500);
  }
  setTimeout(revealNext,600);
}

function simulateMatch(myP,oppP) {
  const diff=myP.rating-oppP.rating;
  const h2h=getH2H(myP.name,oppP.name);
  const total=diff+h2h;
  const winProb=1/(1+Math.exp(-total*0.12));
  let myG=0,oppG=0;const scores=[];
  while(myG<3&&oppG<3){
    const gp=winProb+(Math.random()-0.5)*0.15;
    const won=Math.random()<gp;
    let ws=11,ls;
    const c=Math.random();
    if(c<0.3){ls=Math.floor(Math.random()*5)+7;if(ls>=10)ws=ls+2;}
    else if(c<0.6)ls=Math.floor(Math.random()*3)+5;
    else ls=Math.floor(Math.random()*5);
    if(won){scores.push({my:ws,opp:ls});myG++;}
    else{scores.push({my:ls,opp:ws});oppG++;}
  }
  return{myPlayer:myP,oppPlayer:oppP,won:myG>oppG,myGames:myG,oppGames:oppG,gameScores:scores,winProb:Math.round(winProb*100)};
}

function startMatchSim() {
  document.getElementById('sim-scoreboard').style.display='flex';
  const matches=[
    {my:mySlots.A,opp:oppSlots.X,round:'第1盘'},
    {my:mySlots.B,opp:oppSlots.Y,round:'第2盘'},
    {my:mySlots.C,opp:oppSlots.Z,round:'第3盘'},
    {my:mySlots.A,opp:oppSlots.Y,round:'第4盘'},
    {my:mySlots.B,opp:oppSlots.X,round:'第5盘'}
  ];
  simResults=matches.map(m=>({...simulateMatch(m.my,m.opp),round:m.round}));
  
  const list=document.getElementById('sim-match-list');
  list.innerHTML=simResults.map((r,i)=>`
    <div class="sim-match-item" id="si-${i}">
      <div class="sim-match-top">
        <span class="sim-match-round">${r.round}</span>
        <span class="sim-match-result" id="sr-${i}"></span>
      </div>
      <div class="sim-match-players">
        <div class="sim-p"><div class="name">${r.myPlayer.name}</div><div class="detail-score" id="ss-${i}"></div></div>
        <div class="sim-p-vs">VS</div>
        <div class="sim-p"><div class="name">${r.oppPlayer.name}</div></div>
      </div>
    </div>`).join('');
  
  let homeS=0,awayS=0,mi=0;
  function reveal() {
    if(mi>=simResults.length||homeS>=3||awayS>=3){setTimeout(()=>showResult(homeS,awayS),600);return;}
    const r=simResults[mi];
    const item=document.getElementById('si-'+mi);
    const res=document.getElementById('sr-'+mi);
    const sc=document.getElementById('ss-'+mi);
    item.classList.add('revealed',r.won?'win':'lose');
    res.textContent=r.won?'胜':'负';
    res.className='sim-match-result '+(r.won?'win':'lose');
    sc.textContent=r.myGames+':'+r.oppGames+' ('+r.gameScores.map(g=>g.my+'-'+g.opp).join(' / ')+')';
    if(r.won)homeS++;else awayS++;
    document.getElementById('score-home').textContent=homeS;
    document.getElementById('score-away').textContent=awayS;
    mi++;
    setTimeout(reveal,1200);
  }
  setTimeout(reveal,400);
}

function showResult(h,a) {
  const won=h>a;
  document.getElementById('result-emoji').textContent=won?'🏆':'😤';
  const t=document.getElementById('result-title');
  t.textContent=won?myTeam.name+'队获胜！':'遗憾落败...';
  t.className='result-title '+(won?'win':'lose');
  document.getElementById('result-sub').textContent=won
    ?`以 ${h}:${a} 击败${oppTeam.name}队！`
    :`${h}:${a} 不敌${oppTeam.name}队，换个阵容再来！`;
  document.getElementById('final-score-home').textContent=h;
  document.getElementById('final-score-away').textContent=a;
  document.getElementById('final-my-flag').textContent=myTeam.flag;
  document.getElementById('final-my-name').textContent=myTeam.name;
  document.getElementById('final-opp-flag').textContent=oppTeam.flag;
  document.getElementById('final-opp-name').textContent=oppTeam.name;
  
  const lineup=document.getElementById('share-lineup');
  let ch=0,ca=0;
  lineup.innerHTML=simResults.map(r=>{
    if(ch>=3||ca>=3)return'';
    if(r.won)ch++;else ca++;
    return `<div class="share-lineup-row">
      <span class="round">${r.round}</span>
      <span class="players">${r.myPlayer.name} vs ${r.oppPlayer.name}</span>
      <span class="result-tag ${r.won?'w':'l'}">${r.won?'胜':'负'} ${r.myGames}:${r.oppGames}</span>
    </div>`;
  }).join('');
  
  showScreen('screen-result');
  if(won)spawnConfetti();
}

function spawnConfetti() {
  const colors=['#F59E0B','#3B82F6','#22C55E','#8B5CF6','#F8FAFC'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';p.style.top=(Math.random()*40+30)+'vh';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*0.5+'s';
    p.style.animationDuration=(1+Math.random())+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),2000);
  }
}

function shareResult() {
  const won=parseInt(document.getElementById('final-score-home').textContent)>parseInt(document.getElementById('final-score-away').textContent);
  const sc=document.getElementById('final-score-home').textContent+':'+document.getElementById('final-score-away').textContent;
  let txt=`🏓 乒乒乓乓博弈战\n`;
  txt+=`${myTeam.flag} ${myTeam.name} ${sc} ${oppTeam.flag} ${oppTeam.name}\n`;
  txt+=`我的阵容：A.${mySlots.A.name} B.${mySlots.B.name} C.${mySlots.C.name}\n`;
  txt+=`对手阵容：X.${oppSlots.X.name} Y.${oppSlots.Y.name} Z.${oppSlots.Z.name}\n`;
  txt+=won?`🏆 成功击败${oppTeam.name}队！`:`😤 不敌${oppTeam.name}队，不服再来！`;
  txt+=`\n你也来排一局 👉 https://tsportsg.github.io/pingpong-game/`;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>alert('已复制到剪贴板！'));}
  else{prompt('复制分享：',txt);}
}
