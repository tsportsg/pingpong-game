<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>乒乒乓乓大预言家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#D4A843;--primary-dark:#B8922F;--primary-glow:rgba(212,168,67,0.25);
  --accent:#D4A843;--accent-glow:rgba(212,168,67,0.2);
  --blue:#4A9EE5;--blue-glow:rgba(74,158,229,0.2);
  --bg:#111318;--bg2:#16181E;--bg3:#1C1F27;
  --card:#1C1F27;--card-hover:#22252E;--card-border:rgba(255,255,255,0.06);
  --text:#EAEDF3;--text-dim:#9BA3B5;--text-muted:#5E6577;
  --win:#34D399;--lose:#F87171;
  --surface:rgba(255,255,255,0.03);--surface-hover:rgba(255,255,255,0.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}

/* 微妙噪点纹理 */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}

.header{text-align:center;padding:32px 20px 16px;position:relative}
.header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:48px;height:3px;background:var(--primary);border-radius:2px}
.header h1{font-size:24px;font-weight:800;color:#fff;letter-spacing:2px;line-height:1.3}
.header .subtitle{font-size:12px;color:var(--primary);margin-top:6px;letter-spacing:2px;font-weight:600;text-transform:uppercase}
.header .tagline{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:400}
.header .event-badge{display:inline-block;margin-top:10px;padding:4px 14px;background:var(--primary);border:none;border-radius:4px;font-size:10px;color:#111;font-weight:700;letter-spacing:1px}

.screen{display:none}.screen.active{display:block}

/* Tab bar */
.tab-bar{display:flex;gap:0;padding:0 20px;margin-top:4px;border-bottom:1px solid var(--card-border)}
.tab-btn{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:600;color:var(--text-muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .25s;letter-spacing:0.5px}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Gender toggle */
.gender-toggle{display:flex;justify-content:center;gap:8px;padding:12px 20px}
.gender-btn{padding:7px 22px;border-radius:20px;border:1px solid var(--card-border);background:var(--bg3);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .25s}
.gender-btn.active{background:var(--primary);color:#111;border-color:var(--primary);font-weight:700}

/* Schedule list */
.schedule-section{padding:8px 16px}
.schedule-date{font-size:11px;color:var(--text-muted);font-weight:600;padding:10px 0 4px;letter-spacing:1px;text-transform:uppercase}
.match-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.match-card:active{transform:scale(0.98);opacity:0.92}
.match-card .match-info{display:flex;align-items:center;justify-content:space-between}
.match-card .match-teams{display:flex;align-items:center;gap:8px;flex:1}
.match-card .team-item{display:flex;align-items:center;gap:6px}
.match-card .flag{font-size:22px}
.match-card .tname{font-size:14px;font-weight:700}
.match-card .vs{color:var(--text-muted);font-size:11px;font-weight:700;margin:0 4px}
.match-card .match-meta{text-align:right;flex-shrink:0}
.match-card .match-round{font-size:11px;color:var(--primary);font-weight:700}
.match-card .match-time{font-size:10px;color:var(--text-muted);margin-top:2px}
.match-card .match-status{margin-top:8px;display:flex;align-items:center;justify-content:space-between}
.match-card .status-tag{font-size:10px;padding:3px 10px;border-radius:4px;font-weight:600}
.status-tag.open{background:rgba(212,168,67,0.12);color:var(--primary)}
.status-tag.predicted{background:rgba(52,211,153,0.12);color:var(--win)}
.status-tag.locked{background:rgba(94,101,119,0.15);color:var(--text-muted)}
.status-tag.finished{background:rgba(94,101,119,0.12);color:var(--text-muted)}
.match-card.finished{opacity:0.6;cursor:default}
.match-card.finished:active{transform:none;opacity:0.6}
.match-card .predict-arrow{color:var(--text-dim);font-size:12px;font-weight:600}

/* Predict flow - Step 1: pick side */
.predict-header{text-align:center;padding:20px 16px 12px}
.predict-header .match-title{font-size:12px;color:var(--primary);font-weight:600;letter-spacing:1px}
.predict-header .match-versus{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:12px}
.predict-header .versus-team{text-align:center}
.predict-header .versus-team .flag{font-size:36px}
.predict-header .versus-team .tname{font-size:16px;font-weight:800;margin-top:4px}
.predict-header .vs-big{font-size:16px;color:var(--text-muted);font-weight:800;letter-spacing:2px}

.side-pick{padding:0 16px}
.side-pick-title{font-size:14px;font-weight:600;text-align:center;margin-bottom:14px;color:var(--text-dim)}
.side-pick-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.side-option{background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .25s}
.side-option:active{transform:scale(0.97)}
.side-option.selected{border-color:var(--primary);background:rgba(212,168,67,0.08);box-shadow:0 0 0 1px var(--primary)}
.side-option .flag{font-size:36px}
.side-option .tname{font-size:15px;font-weight:800;margin-top:6px}
.side-option .seed{font-size:10px;color:var(--text-muted);margin-top:3px}

/* Tactics screen */
.section-title{font-size:14px;font-weight:700;padding:14px 16px 6px;color:var(--text)}
.section-hint{font-size:11px;color:var(--text-muted);padding:0 16px 6px}
.matchup-header{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 16px}
.team-badge{text-align:center}
.team-badge .flag{font-size:30px}
.team-badge .name{font-size:13px;font-weight:700;margin-top:3px}
.vs-text{font-size:14px;color:var(--text-muted);font-weight:800;letter-spacing:2px}
.rule-hint{text-align:center;font-size:11px;color:var(--text-muted);padding:4px 20px 10px;line-height:1.8;background:var(--bg3);margin:0 16px;border-radius:8px}

/* Match slots */
.slots-container{padding:0 16px}
.match-slot{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slot-round{font-size:12px;font-weight:700;color:var(--primary)}
.slot-vs-label{font-size:10px;color:var(--text-muted)}
.slot-body{display:flex;align-items:center;gap:8px}
.slot-select-btn{flex:1;text-align:center;padding:11px;border-radius:8px;background:rgba(212,168,67,0.06);border:1px dashed rgba(212,168,67,0.25);color:var(--primary);font-size:13px;cursor:pointer;transition:all .25s;font-weight:600}
.slot-select-btn.filled{border-style:solid;background:rgba(212,168,67,0.1);color:var(--text);border-color:rgba(212,168,67,0.2)}
.slot-vs{font-weight:800;color:var(--text-muted);font-size:11px}
.slot-hidden{font-size:12px;color:var(--text-muted);flex:1;text-align:center}
.slot-player{flex:1;text-align:center}
.slot-player .player-name{font-size:13px;font-weight:700}
.slot-player .player-rank{font-size:10px;color:var(--text-muted)}

/* Action bar */
.action-bar{padding:12px 16px 8px;display:flex;flex-direction:column;gap:8px}
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:var(--primary);color:#111;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:0.5px}
.btn-primary:active{transform:scale(0.98);opacity:0.9}
.btn-primary:disabled{opacity:0.3;cursor:default;transform:none}
.btn-secondary{width:100%;padding:11px;border-radius:10px;border:1px solid var(--card-border);background:var(--bg3);color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.btn-secondary:active{background:var(--card-hover)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal-content{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:420px;max-height:70vh;overflow-y:auto;padding:20px 16px}
.modal-title{font-size:15px;font-weight:700;text-align:center;margin-bottom:14px}
.player-option{display:flex;align-items:center;justify-content:space-between;padding:13px;border-radius:10px;margin-bottom:6px;background:var(--card);border:1px solid var(--card-border);cursor:pointer;transition:all .2s}
.player-option:active{background:var(--card-hover)}
.player-option.disabled{opacity:0.25;pointer-events:none}
.p-info{display:flex;flex-direction:column}
.p-name{font-size:14px;font-weight:700}
.p-meta{font-size:10px;color:var(--text-muted);margin-top:2px}
.p-rating{font-size:14px;font-weight:700;color:var(--primary)}

/* Score prediction */
.score-predict{padding:0 16px;margin-top:10px}
.score-predict-title{font-size:14px;font-weight:700;text-align:center;margin-bottom:12px;color:var(--text)}
.score-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.score-option{padding:11px 18px;border-radius:10px;border:1.5px solid var(--card-border);background:var(--card);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;transition:all .25s;min-width:72px;text-align:center}
.score-option:active{transform:scale(0.96)}
.score-option.selected{border-color:var(--primary);background:rgba(212,168,67,0.1);box-shadow:0 0 0 1px var(--primary)}
.score-option.lose-option{color:var(--text-dim)}
.score-option.lose-option.selected{border-color:var(--lose);background:rgba(248,113,113,0.08);box-shadow:0 0 0 1px var(--lose)}

/* Sim screen */
.opp-reveal{padding:14px 16px;text-align:center}
.opp-reveal h3{font-size:14px;color:var(--primary);margin-bottom:10px;font-weight:700}
.opp-reveal-list{display:flex;flex-direction:column;gap:4px}
.opp-reveal-item{display:flex;align-items:center;justify-content:center;gap:12px;padding:9px 12px;background:var(--card);border-radius:8px;animation:fadeIn 0.3s ease}
.opp-reveal-item .pos{font-size:11px;color:var(--primary);font-weight:700;width:32px}
.opp-reveal-item .pname{font-size:14px;font-weight:700}
.opp-reveal-item .prank{font-size:10px;color:var(--text-muted)}

.sim-scoreboard{display:flex;align-items:center;justify-content:center;gap:20px;padding:14px 16px}
.sim-team{text-align:center}
.sim-team .flag{font-size:22px}
.sim-team .name{font-size:12px;font-weight:700;margin-top:2px}
.sim-score{display:flex;align-items:center;gap:8px}
.score-home,.score-away{font-size:32px;font-weight:900;min-width:36px;text-align:center}
.score-home{color:var(--win)}.score-away{color:var(--lose)}
.colon{font-size:24px;color:var(--text-muted)}

.sim-match-list{padding:0 16px 12px}
.sim-match-item{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:6px;opacity:0.3;transition:all .5s}
.sim-match-item.revealed{opacity:1}
.sim-match-item.win{border-left:3px solid var(--win)}
.sim-match-item.lose{border-left:3px solid var(--lose)}
.sim-match-top{display:flex;justify-content:space-between;margin-bottom:5px}
.sim-match-round{font-size:11px;font-weight:700;color:var(--primary)}
.sim-match-result{font-size:11px;font-weight:700}.sim-match-result.win{color:var(--win)}.sim-match-result.lose{color:var(--lose)}
.sim-match-players{display:flex;align-items:center;justify-content:space-between}
.sim-p{flex:1}.sim-p .name{font-size:13px;font-weight:700}.sim-p .detail-score{font-size:10px;color:var(--text-muted);margin-top:2px}
.sim-p-vs{font-size:10px;color:var(--text-muted);font-weight:800;margin:0 8px}

/* Match highlights */
.sim-highlights{padding:6px 0 2px;display:flex;flex-direction:column;gap:4px}
.highlight-item{font-size:11px;line-height:1.5;color:var(--text-dim);padding:4px 10px;background:rgba(255,255,255,0.02);border-radius:6px;border-left:2px solid var(--primary);opacity:0;transform:translateX(-6px);transition:all .4s ease}
.highlight-item.show{opacity:1;transform:translateX(0)}

/* Prophecy card */
.prophecy-card{margin:0 16px;border-radius:14px;overflow:hidden;background:var(--bg3);border:1px solid var(--card-border)}
.prophecy-card-header{background:var(--primary);padding:2px 0}
.prophecy-card-body{padding:18px 16px}
.prophecy-card .prophecy-title{font-size:17px;font-weight:800;text-align:center;margin-bottom:4px;color:#fff}
.prophecy-card .prophecy-sub{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:14px}
.prophecy-card .prophecy-teams{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
.prophecy-card .prophecy-teams .team{text-align:center}
.prophecy-card .prophecy-teams .team .flag{font-size:30px}
.prophecy-card .prophecy-teams .team .tname{font-size:14px;font-weight:700;margin-top:2px}
.prophecy-card .prophecy-score{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px}
.prophecy-card .prophecy-score .num{font-size:36px;font-weight:900;min-width:40px;text-align:center}
.prophecy-card .prophecy-score .num.win{color:var(--win)}
.prophecy-card .prophecy-score .num.lose{color:var(--lose)}
.prophecy-card .prophecy-score .sep{font-size:24px;color:var(--text-muted)}
.prophecy-card .lineup-detail{padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:8px}
.prophecy-card .lineup-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px}
.prophecy-card .lineup-row .round{color:var(--primary);font-weight:600;width:40px}
.prophecy-card .lineup-row .players{flex:1;color:var(--text-dim)}
.prophecy-card .lineup-row .result-tag{font-weight:700;font-size:11px}
.prophecy-card .lineup-row .result-tag.w{color:var(--win)}
.prophecy-card .lineup-row .result-tag.l{color:var(--lose)}
.prophecy-card .prophecy-footer{text-align:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--card-border)}
.prophecy-card .prophecy-footer .label{font-size:10px;color:var(--text-muted)}
.prophecy-card .prophecy-footer .logo-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.prophecy-card .prophecy-footer .logo-row img{height:18px;border-radius:4px}
.prophecy-card .prophecy-footer .logo-row span{font-size:11px;color:var(--text-dim);font-weight:600}

/* Result banner */
.result-banner{text-align:center;padding:24px 16px 14px}
.result-emoji{font-size:48px}
.result-title{font-size:20px;font-weight:800;margin-top:10px}
.result-title.win{color:var(--win)}.result-title.lose{color:var(--lose)}
.result-sub{font-size:13px;color:var(--text-dim);margin-top:6px}

.btn-group{padding:8px 16px;display:flex;flex-direction:column;gap:8px}

/* My predictions */
.my-predictions{padding:12px 16px}
.pred-empty{text-align:center;padding:36px 0;color:var(--text-muted);font-size:13px}
.pred-item{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:13px 14px;margin-bottom:8px}
.pred-item .pred-match{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700}
.pred-item .pred-match .flag{font-size:18px}
.pred-item .pred-detail{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.pred-item .pred-score{font-size:14px;font-weight:700;color:var(--primary)}
.pred-item .pred-lineup{font-size:10px;color:var(--text-muted)}
.pred-item .pred-time{font-size:10px;color:var(--text-muted);margin-top:4px}

/* Confetti */
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(-100px) rotate(360deg)}}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:confetti 1.5s ease forwards;z-index:200}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Bottom search bar */
.app-search-bar{position:sticky;bottom:0;padding:10px 16px;background:rgba(17,19,24,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:50;border-top:1px solid var(--card-border)}
.app-search-wrapper{width:100%;max-width:380px;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:24px;background:rgba(255,255,255,0.04);margin:0 auto}
.app-capsule{display:flex;align-items:stretch;width:100%;border-radius:20px;overflow:hidden;cursor:pointer;box-shadow:none;border:none}
.app-capsule:active{transform:scale(0.98);opacity:0.9}
.app-capsule-left{display:flex;align-items:center;gap:6px;padding:6px 10px;background:transparent;flex-shrink:0}
.app-capsule-left img{height:36px;width:36px;object-fit:contain;border-radius:6px;vertical-align:middle;display:block}
.app-capsule-right{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 16px;background:transparent}
.app-capsule-right .kw{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:6px}
.search-icon-svg{width:16px;height:16px;opacity:0.5}
</style>
</head>
<body>

<div class="header">
  <h1>乒乒乓乓大预言家</h1>
  <div class="subtitle">2026 伦敦世乒赛 · 团体赛预言</div>
  <div class="tagline">排兵布阵，预测赛果，看看你的预言准不准</div>
  <div class="event-badge">ITTF LONDON 2026</div>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <div class="tab-btn active" onclick="switchTab('schedule')">赛程预言</div>
  <div class="tab-btn" onclick="switchTab('records')">我的预言</div>
</div>

<!-- ===== TAB 1: Schedule (赛程预言) ===== -->
<div id="tab-schedule" class="screen active">
  <div class="gender-toggle">
    <div class="gender-btn active" onclick="switchGender('men')">男团</div>
    <div class="gender-btn" onclick="switchGender('women')">女团</div>
  </div>
  <div class="schedule-section" id="schedule-list"></div>
</div>


<!-- ===== TAB 3: My predictions ===== -->
<div id="tab-records" class="screen">
  <div class="my-predictions" id="predictions-list">
    <div class="pred-empty">还没有预言记录，去赛程页面开始你的第一次预言吧！</div>
  </div>
</div>

<!-- ===== SCREEN: Pick side (赛程模式) ===== -->
<div id="screen-pick-side" class="screen">
  <div class="predict-header">
    <div class="match-title" id="ps-round"></div>
    <div class="match-versus">
      <div class="versus-team"><div class="flag" id="ps-home-flag"></div><div class="tname" id="ps-home-name"></div></div>
      <div class="vs-big">VS</div>
      <div class="versus-team"><div class="flag" id="ps-away-flag"></div><div class="tname" id="ps-away-name"></div></div>
    </div>
  </div>
  <div class="side-pick">
    <div class="side-pick-title">你看好哪支队伍获胜？</div>
    <div class="side-pick-options" id="side-options"></div>
  </div>
  <div class="action-bar" style="margin-top:12px">
    <button class="btn-primary" id="btn-pick-side" disabled onclick="goToTacticsSchedule()">选好后，为主队排阵 →</button>
    <button class="btn-secondary" onclick="backToSchedule()">← 返回赛程</button>
  </div>
</div>

<!-- ===== SCREEN: Tactics (shared) ===== -->
<div id="screen-tactics" class="screen">
  <div class="matchup-header">
    <div class="team-badge"><span class="flag" id="my-flag"></span><div class="name" id="my-name"></div></div>
    <div class="vs-text">VS</div>
    <div class="team-badge"><span class="flag" id="opp-flag"></span><div class="name" id="opp-name"></div></div>
  </div>
  <div class="rule-hint">
    5盘3胜 · 全单打制<br>

function isMatchFinished(dateStr) {
  // dateStr格式: "5月5日 17:00" 或 "5月7日 待定"
  const parts = dateStr.match(/(\d+)月(\d+)日\s*(\d{2}:\d{2})?/);
  if(!parts) return false;
  const month = parseInt(parts[1]);
  const day = parseInt(parts[2]);
  const timeStr = parts[3];
  if(!timeStr || timeStr === '待定') return false; // 时间待定的不标记已结束
  const [h,min] = timeStr.split(':').map(Number);
  // 比赛开始后约3小时视为结束（团体赛通常2-3小时）
  const matchEnd = new Date(2026, month-1, day, h+3, min);
  return new Date() > matchEnd;
}

// ===== SCHEDULE LIST =====
function renderSchedule() {
  const list = document.getElementById('schedule-list');
  const matches = SCHEDULE[gender];
  const teams = DATA[gender].teams;
  
  // Group by date
  const groups = {};
  matches.forEach(m=>{
    const dateStr = m.date.split(' ')[0];
    if(!groups[dateStr]) groups[dateStr] = [];
    const home = teams.find(t=>t.id===m.homeId);
    const away = teams.find(t=>t.id===m.awayId);
    const pred = predictions.find(p=>p.matchId===m.id);
    groups[dateStr].push({...m, home, away, predicted:!!pred});
  });
  
  let html = '';
  for(const date in groups) {
    html += `<div class="schedule-date">${date}</div>`;
    groups[date].forEach(m=>{
      const finished = isMatchFinished(m.date);
      let statusClass, statusText, arrowText, cardClass;
      if(finished) {
        statusClass = 'finished';
        statusText = '已结束';
        arrowText = '';
        cardClass = 'match-card finished';
      } else if(m.predicted) {
        statusClass = 'predicted';
        statusText = '已预言';
        arrowText = '查看 →';
        cardClass = 'match-card';
      } else {
        statusClass = 'open';
        statusText = '待预言';
        arrowText = '去预言 →';
        cardClass = 'match-card';
      }
      html += `
      <div class="${cardClass}" ${finished?'':`onclick="enterPrediction('${m.id}')"`}>
        <div class="match-info">
          <div class="match-teams">
            <div class="team-item"><span class="flag">${m.home.flag}</span><span class="tname">${m.home.name}</span></div>
            <span class="vs">VS</span>
            <div class="team-item"><span class="flag">${m.away.flag}</span><span class="tname">${m.away.name}</span></div>
          </div>
          <div class="match-meta">
            <div class="match-round">${m.round}</div>
            <div class="match-time">${m.date.split(' ')[1]||''}</div>
          </div>
        </div>
        <div class="match-status">
          <span class="status-tag ${statusClass}">${statusText}</span>
          <span class="predict-arrow">${arrowText}</span>
        </div>
      </div>`;
    });
  }
  list.innerHTML = html;
}

// ===== ENTER PREDICTION =====
function enterPrediction(matchId) {
  currentMatchId = matchId;
  pickedSide = null;
  
  const match = [...SCHEDULE.men,...SCHEDULE.women].find(m=>m.id===matchId);
  // 已结束的比赛不允许进入预言
  if(isMatchFinished(match.date)) return;
  
  const g = matchId.startsWith('w_') ? 'women' : 'men';
  const teams = DATA[g].teams;
  const home = teams.find(t=>t.id===match.homeId);
  const away = teams.find(t=>t.id===match.awayId);
  
  document.getElementById('ps-round').textContent = match.round + ' · ' + match.date;
  document.getElementById('ps-home-flag').textContent = home.flag;
  document.getElementById('ps-home-name').textContent = home.name;
  document.getElementById('ps-away-flag').textContent = away.flag;
  document.getElementById('ps-away-name').textContent = away.name;
  
  document.getElementById('side-options').innerHTML = [
    {side:'home',team:home},

  ].map(o=>`
    <div class="side-option" data-side="${o.side}" onclick="pickSide('${o.side}')">
      <div class="flag">${o.team.flag}</div>
      <div class="tname">${o.team.name}</div>
      <div class="seed">${o.team.seed ? o.team.seed+'号种子' : '非种子'}</div>

// ===== TACTICS (shared) =====
function setupTactics() {
  mySlots={A:null,B:null,C:null};
  generateOppLineup();
  document.getElementById('my-flag').textContent=myTeam.flag;
  document.getElementById('my-name').textContent=myTeam.name;
  document.getElementById('opp-flag').textContent=oppTeam.flag;
  document.getElementById('opp-name').textContent=oppTeam.name;
  renderSlots();showScreen('screen-tactics');updateFightBtn();
}

function generateOppLineup() {
  const pool = [...oppTeam.players];
  const weights = pool.map((p,i)=>{
    if(i<3) return 5-i;
    return Math.random()<0.25?2:0.5;
  });
  const selected = [];
  for(let pick=0;pick<3;pick++){
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total,cum=0;
    for(let j=0;j<pool.length;j++){
      cum+=weights[j];
      if(r<=cum&&!selected.includes(j)){selected.push(j);weights[j]=0;break;}
      if(j===pool.length-1){for(let k=0;k<pool.length;k++){if(!selected.includes(k)){selected.push(k);weights[k]=0;break;}}}
    }
  }
  const picks = selected.map(i=>pool[i]).sort((a,b)=>b.rating-a.rating);
  const strategies = [[0,1,2],[1,0,2],[0,2,1],[2,0,1]];
  const strat = strategies[Math.floor(Math.random()*strategies.length)];
  oppSlots={X:picks[strat[0]],Y:picks[strat[1]],Z:picks[strat[2]]};
}

function renderSlots() {
  const container=document.getElementById('slots-container');
  const matches=[
    {round:'第1盘',my:'A',opp:'X'},{round:'第2盘',my:'B',opp:'Y'},
    {round:'第3盘',my:'C',opp:'Z'},{round:'第4盘',my:'A',opp:'Y'},
    {round:'第5盘',my:'B',opp:'X'}
  ];
  container.innerHTML=matches.map((m,i)=>{
    const myP=mySlots[m.my];
    const isAuto=(m.my==='A'&&i===3)||(m.my==='B'&&i===4);
    return `
    <div class="match-slot">
      <div class="slot-header">
        <span class="slot-round">${m.round}</span>
        <span class="slot-vs-label">${m.my} vs ${m.opp}</span>
      </div>
      <div class="slot-body">
        ${isAuto?`
          <div class="slot-player">
            <div class="player-name" style="color:${myP?'var(--win)':'var(--text-muted)'}">${myP?myP.name:'(跟随'+m.my+'位)'}</div>
            <div class="player-rank">${myP?'世界第'+myP.rank:'自动跟随'}</div>
          </div>
        `:`
          <div class="slot-select-btn ${myP?'filled':''}" onclick="openPicker('${m.my}')">
            ${myP?myP.name+'<br><span style="font-size:10px">世界第'+myP.rank+'</span>':'点击选人 ('+m.my+'位)'}
          </div>
        `}
        <div class="slot-vs">VS</div>
        <div class="slot-hidden">赛前保密</div>
      </div>
    </div>`;
  }).join('');
}

function openPicker(slot) {
  window._pickSlot=slot;
  const used=Object.values(mySlots).filter(p=>p).map(p=>p.name);
  const posLabel={A:'A位（第1、4盘）',B:'B位（第2、5盘）',C:'C位（第3盘）'};
  document.getElementById('modal-title').textContent='选择 '+posLabel[slot]+' 选手';
  document.getElementById('player-options').innerHTML=myTeam.players.map(p=>{
    const isUsed=used.includes(p.name)&&(!mySlots[slot]||mySlots[slot].name!==p.name);
    return `
    <div class="player-option ${isUsed?'disabled':''}" onclick="pickPlayer('${p.name}')">
      <div class="p-info">
        <span class="p-name">${p.name}</span>
        <span class="p-meta">世界第${p.rank} · ${p.pts}分</span>
      </div>
      <div class="p-rating">${p.rating}</div>
    </div>`;
  }).join('');
  document.getElementById('player-modal').classList.add('show');
}

function pickPlayer(name) {
  const slot=window._pickSlot;
  const player=myTeam.players.find(p=>p.name===name);
  for(let s in mySlots){if(mySlots[s]&&mySlots[s].name===name&&s!==slot)mySlots[s]=null;}
  mySlots[slot]=player;
  document.getElementById('player-modal').classList.remove('show');
  renderSlots();updateFightBtn();
}
document.getElementById('player-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});

function updateFightBtn() {
  const btn=document.getElementById('btn-fight');
  const ok=mySlots.A&&mySlots.B&&mySlots.C;
  btn.disabled=!ok;
  if(ok)btn.textContent=`${mySlots.A.name}、${mySlots.B.name}、${mySlots.C.name} 出战！`;
  else btn.textContent='提交阵容';
}

function submitProphecy() {
  if(!predictedScore) return;
  
  // Setup sim screen
  ['sim-my-flag','sb-my-flag'].forEach(id=>document.getElementById(id).textContent=myTeam.flag);
  ['sim-my-name','sb-my-name'].forEach(id=>document.getElementById(id).textContent=myTeam.name);
  ['sim-opp-flag','sb-opp-flag'].forEach(id=>document.getElementById(id).textContent=oppTeam.flag);
  ['sim-opp-name','sb-opp-name'].forEach(id=>document.getElementById(id).textContent=oppTeam.name);
  document.getElementById('score-home').textContent='0';
  document.getElementById('score-away').textContent='0';
  document.getElementById('sim-scoreboard').style.display='none';
  document.getElementById('sim-match-list').innerHTML='';
  
  const revealBox=document.getElementById('opp-reveal-box');
  revealBox.style.display='block';
  const revealList=document.getElementById('opp-reveal-list');
  revealList.innerHTML='';
  
  showScreen('screen-sim');
  
  const posLabels=[{pos:'X位',player:oppSlots.X},{pos:'Y位',player:oppSlots.Y},{pos:'Z位',player:oppSlots.Z}];
  let ri=0;
  function revealNext() {
    if(ri>=posLabels.length){
      setTimeout(startMatchSim,800);
      return;
    }
    const p=posLabels[ri];
    const div=document.createElement('div');
    div.className='opp-reveal-item';
    div.style.animationDelay=(ri*0.15)+'s';
    div.innerHTML=`<span class="pos">${p.pos}</span><span class="pname">${p.player.name}</span><span class="prank">世界第${p.player.rank}</span>`;
    revealList.appendChild(div);
    ri++;
    setTimeout(revealNext,500);
  }
  setTimeout(revealNext,600);
}

// 为每盘比赛生成2-3条花絮
function generateHighlights(result) {
  const {myPlayer, oppPlayer, won, myGames, oppGames, gameScores} = result;
  const highlights = [];
  
  const myHL = PLAYER_HIGHLIGHTS[myPlayer.name] || null;
  const oppHL = PLAYER_HIGHLIGHTS[oppPlayer.name] || null;
  
  // 分析比赛态势
  const isClose = Math.abs(myGames - oppGames) <= 1 && gameScores.length >= 4;
  const isDominant = won && oppGames <= 1;
  const hasDeuce = gameScores.some(g => g.my >= 10 && g.opp >= 10);
  
  // 第一条：开局/关键得分花絮
  if(myHL) {
    if(won) {
      highlights.push(pick(myHL.win));
    } else {
      highlights.push(pick(myHL.lose));
    }
  }
  
  // 第二条：对手的反应/花絮
  if(oppHL) {
    if(!won) {
      highlights.push(pick(oppHL.win));
    } else {
      highlights.push(pick(oppHL.lose));
    }
  }
  
  // 第三条：比赛氛围/关键球/转折
  if(hasDeuce && myHL && myHL.clutch) {
    highlights.push(pick(myHL.clutch));
  } else if(isClose) {
    highlights.push(pick(GENERIC_HIGHLIGHTS.win_close));
  } else if(isDominant) {
    highlights.push(pick(GENERIC_HIGHLIGHTS.win_dominant));
  } else if(!won && myHL && myHL.momentum) {
    highlights.push(pick(myHL.momentum));
  } else {
    highlights.push(pick(GENERIC_HIGHLIGHTS.atmosphere));
  }
  
  // 偶尔加第四条（30%概率）
  if(Math.random() < 0.3) {
    highlights.push(pick(GENERIC_HIGHLIGHTS.atmosphere));
  }
  
  return highlights.filter(Boolean); // 过滤掉null
}

function pick(arr) {
  if(!arr || arr.length === 0) return null;
  return arr[Math.floor(Math.random() * arr.length)];
}

// ===== SIMULATION =====
// 生成单盘比赛的"剧情"（局分细节），胜负由外部指定
function simulateMatchDetail(myP, oppP, mustWin) {
  const diff = myP.rating - oppP.rating;
  const h2h = getH2H(myP.name, oppP.name);
  const total = diff + h2h;
  let winProb = 1/(1+Math.exp(-total*0.12));
  
  // 根据实力差距决定赢/输得多"合理"
  // mustWin=true → 这盘必须我方赢, mustWin=false → 这盘必须对方赢
  let myG=0, oppG=0;
  const scores=[];
  
  if(mustWin) {
    // 我方赢这盘：3:0 / 3:1 / 3:2 取决于实力差
    const dominance = Math.min(1, Math.max(0, (winProb-0.3)/0.5)); // 0~1
    const r = Math.random();
    let targetMyG, targetOppG;
    if(r < 0.15 + dominance*0.35) { targetMyG=3; targetOppG=0; }      // 强势横扫
    else if(r < 0.55 + dominance*0.2) { targetMyG=3; targetOppG=1; }   // 正常赢
    else { targetMyG=3; targetOppG=2; }                                 // 苦战
    
    // 生成局分序列（先随机排胜负局的位置）
    const totalGames = targetMyG + targetOppG;
    const winSlots = new Set();
    // 最后一局必须是赢
    winSlots.add(totalGames-1);
    while(winSlots.size < targetMyG) {
      winSlots.add(Math.floor(Math.random()*(totalGames-1)));
    }
    for(let i=0; i<totalGames; i++) {
      if(winSlots.has(i)) {
        let ws=11, ls;
        const c=Math.random();
        if(c<0.3){ls=Math.floor(Math.random()*5)+7;if(ls>=10)ws=ls+2;}
        else if(c<0.6)ls=Math.floor(Math.random()*3)+5;
        else ls=Math.floor(Math.random()*5);
        scores.push({my:ws, opp:ls}); myG++;
      } else {
        let ws=11, ls;
        const c=Math.random();
        if(c<0.3){ls=Math.floor(Math.random()*5)+7;if(ls>=10)ws=ls+2;}
        else if(c<0.6)ls=Math.floor(Math.random()*3)+5;
        else ls=Math.floor(Math.random()*5);
        scores.push({my:ls, opp:ws}); oppG++;
      }
    }
  } else {
    // 对方赢这盘
    const dominance = Math.min(1, Math.max(0, ((1-winProb)-0.3)/0.5));
    const r = Math.random();
    let targetMyG, targetOppG;
    if(r < 0.15 + dominance*0.35) { targetMyG=0; targetOppG=3; }
    else if(r < 0.55 + dominance*0.2) { targetMyG=1; targetOppG=3; }
    else { targetMyG=2; targetOppG=3; }
    
    const totalGames = targetMyG + targetOppG;
    const loseSlots = new Set();
    loseSlots.add(totalGames-1); // 最后一局必须是输
    while(loseSlots.size < targetOppG) {
      loseSlots.add(Math.floor(Math.random()*(totalGames-1)));
    }
    for(let i=0; i<totalGames; i++) {
      if(loseSlots.has(i)) {
        let ws=11, ls;
        const c=Math.random();
        if(c<0.3){ls=Math.floor(Math.random()*5)+7;if(ls>=10)ws=ls+2;}
        else if(c<0.6)ls=Math.floor(Math.random()*3)+5;
        else ls=Math.floor(Math.random()*5);
        scores.push({my:ls, opp:ws}); oppG++;
      } else {
        let ws=11, ls;
        const c=Math.random();
        if(c<0.3){ls=Math.floor(Math.random()*5)+7;if(ls>=10)ws=ls+2;}
        else if(c<0.6)ls=Math.floor(Math.random()*3)+5;
        else ls=Math.floor(Math.random()*5);
        scores.push({my:ws, opp:ls}); myG++;
      }
    }
  }
  
  const retval = {
    myPlayer:myP, oppPlayer:oppP,
    won: mustWin,
    myGames:myG, oppGames:oppG,
    gameScores:scores,
    winProb: Math.round(winProb*100)
  };
  retval.highlights = generateHighlights(retval);
  return retval;
}

function startMatchSim() {
  document.getElementById('sim-scoreboard').style.display='flex';
  const matches=[
    {my:mySlots.A,opp:oppSlots.X,round:'第1盘'},
    {my:mySlots.B,opp:oppSlots.Y,round:'第2盘'},
    {my:mySlots.C,opp:oppSlots.Z,round:'第3盘'},
    {my:mySlots.A,opp:oppSlots.Y,round:'第4盘'},
    {my:mySlots.B,opp:oppSlots.X,round:'第5盘'}
  ];
  
  // 核心改动：模拟结果严格按照用户的预测比分来编排
  const [predH, predA] = predictedScore.split(':').map(Number);
  const totalMatches = predH + predA; // 实际需要打的盘数
  
  // 决定每盘的胜负分配：predH盘赢、predA盘输
  // 约束：最后一盘的结果决定胜负方向
  const winIndices = new Set();
  const loseIndices = new Set();
  
  // 最后一盘（决定性一盘）
  if(predH > predA) {
    // 我方赢，最后一盘必须赢
    winIndices.add(totalMatches - 1);
  } else {
    // 我方输，最后一盘必须输
    loseIndices.add(totalMatches - 1);
  }
  
  // 随机分配剩余的胜负
  const remainingSlots = [];
  for(let i=0; i<totalMatches-1; i++) remainingSlots.push(i);
  // 洗牌
  for(let i=remainingSlots.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [remainingSlots[i],remainingSlots[j]]=[remainingSlots[j],remainingSlots[i]];
  }
  
  let needWins = predH - winIndices.size;
  let needLoses = predA - loseIndices.size;
  
  for(const idx of remainingSlots) {
    if(needWins > 0) { winIndices.add(idx); needWins--; }
    else { loseIndices.add(idx); needLoses--; }
  }
  
  // 只模拟实际要打的盘数（5盘3胜，打到一方先到3就停）
  simResults = [];
  for(let i=0; i<totalMatches && i<matches.length; i++) {
    const m = matches[i];
    const mustWin = winIndices.has(i);
    const result = simulateMatchDetail(m.my, m.opp, mustWin);
    result.round = m.round;
    simResults.push(result);
  }
  
  const list=document.getElementById('sim-match-list');
  list.innerHTML=simResults.map((r,i)=>`
    <div class="sim-match-item" id="si-${i}">
      <div class="sim-match-top">
        <span class="sim-match-round">${r.round}</span>
        <span class="sim-match-result" id="sr-${i}"></span>
      </div>
      <div class="sim-match-players">
        <div class="sim-p"><div class="name">${r.myPlayer.name}</div><div class="detail-score" id="ss-${i}"></div></div>
        <div class="sim-p-vs">VS</div>
        <div class="sim-p"><div class="name">${r.oppPlayer.name}</div></div>
      </div>
      <div class="sim-highlights" id="sh-${i}">
        ${r.highlights.map((h,j)=>`<div class="highlight-item" id="hl-${i}-${j}">${h}</div>`).join('')}
      </div>
    </div>`).join('');
  
  let homeS=0,awayS=0,mi=0;
  function reveal() {
    if(mi>=simResults.length){setTimeout(()=>showResult(homeS,awayS),600);return;}
    const r=simResults[mi];
    const item=document.getElementById('si-'+mi);
    const res=document.getElementById('sr-'+mi);
    const sc=document.getElementById('ss-'+mi);
    item.classList.add('revealed',r.won?'win':'lose');
    res.textContent=r.won?'胜':'负';
    res.className='sim-match-result '+(r.won?'win':'lose');
    sc.textContent=r.myGames+':'+r.oppGames+' ('+r.gameScores.map(g=>g.my+'-'+g.opp).join(' / ')+')';
    if(r.won)homeS++;else awayS++;
    document.getElementById('score-home').textContent=homeS;
    document.getElementById('score-away').textContent=awayS;
    
    // 逐条弹出花絮
    const curMi = mi;
    r.highlights.forEach((h,j)=>{
      setTimeout(()=>{
        const el = document.getElementById('hl-'+curMi+'-'+j);
        if(el) { el.classList.add('show'); }
      }, 400 + j*500);
    });
    
    const nextDelay = 1200 + r.highlights.length * 500;
    mi++;
    setTimeout(reveal, nextDelay);
  }
  setTimeout(reveal,400);
}

function getResultFlavor(won, scoreH, scoreA) {
  if (won) {
    if (scoreH === 3 && scoreA === 0) return { emoji: '🏆', title: '轻松横扫，Easy！', sub: '三局不失，统治级表现' };
    if (scoreH === 3 && scoreA === 1) return { emoji: '🏆', title: '稳健取胜，大局在握', sub: '虽丢一局但全程掌控节奏' };
    if (scoreH === 3 && scoreA === 2) return { emoji: '🔥', title: '鏖战五局，险胜！', sub: '太刺激了！绝境逆转拿下胜利' };
    return { emoji: '🏆', title: '赢了！', sub: '' };
  } else {
    if (scoreA === 3 && scoreH === 0) return { emoji: '😵', title: '被横扫了...', sub: '对手太强，下次换个排阵试试' };
    if (scoreA === 3 && scoreH === 1) return { emoji: '😤', title: '惜败，差一口气', sub: '有机会但没把握住，不甘心' };
    if (scoreA === 3 && scoreH === 2) return { emoji: '💔', title: '五局惜败，功亏一篑', sub: '都打到决胜局了啊！太可惜了' };
    return { emoji: '😤', title: '输了...', sub: '' };
  }
}

      myTeam: {name:myTeam.name,flag:myTeam.flag},
      oppTeam: {name:oppTeam.name,flag:oppTeam.flag},
      predictedScore: predictedScore,
      lineup: {A:mySlots.A.name,B:mySlots.B.name,C:mySlots.C.name},
      time: new Date().toLocaleString('zh-CN')
    };
    if(existing>=0) predictions[existing]=pred;
    else predictions.push(pred);
    localStorage.setItem('pp_predictions', JSON.stringify(predictions));
  }
  
  showScreen('screen-result');
  if(won) spawnConfetti();
}

function spawnConfetti() {
  const colors=['#F7B731','#1B9CFC','#22C55E','#E74C3C','#F0F4FF'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';p.style.top=(Math.random()*40+30)+'vh';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*0.5+'s';
    p.style.animationDuration=(1+Math.random())+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),2000);
  }
}

// ===== PREDICTIONS LIST =====
function renderPredictions() {
  const list = document.getElementById('predictions-list');
  if(predictions.length===0) {
    list.innerHTML = '<div class="pred-empty">还没有预言记录，去赛程页面开始你的第一次预言吧！</div>';
    return;
  }
  list.innerHTML = predictions.map(p=>{
    const match = [...SCHEDULE.men,...SCHEDULE.women].find(m=>m.id===p.matchId);
    return `
    <div class="pred-item">
      <div class="pred-match">
        <span class="flag">${p.myTeam.flag}</span> ${p.myTeam.name}
        <span style="color:var(--text-muted);font-weight:400">vs</span>
        <span class="flag">${p.oppTeam.flag}</span> ${p.oppTeam.name}
      </div>
      <div class="pred-detail">
        <div>
          <div class="pred-score">预测 ${p.predictedScore}</div>
          <div class="pred-lineup">阵容：${p.lineup.A} / ${p.lineup.B} / ${p.lineup.C}</div>
        </div>
      </div>
      <div class="pred-time">${match?match.round+' · ':''}${p.time}</div>
    </div>`;
  }).join('');
}

// ===== NAVIGATION =====
function resetAndBack() {
  myTeam=null;oppTeam=null;mySlots={A:null,B:null,C:null};predictedScore=null;
  switchTab('schedule');
}
function resetAll() {
  myTeam=null;oppTeam=null;mySlots={A:null,B:null,C:null};predictedScore=null;
  switchTab('schedule');
}

function shareResult() {
  const sc = predictedScore || (document.getElementById('pc-score-home').textContent+':'+document.getElementById('pc-score-away').textContent);
  const match = currentMatchId ? [...SCHEDULE.men,...SCHEDULE.women].find(m=>m.id===currentMatchId) : null;
  const [ph,pa] = sc.split(':').map(Number);
  const won = ph > pa;
  const flavor = getResultFlavor(won, ph, pa);
  let txt = `乒乒乓乓大预言家 · 我的预言\n`;
  if(match) txt += `${match.round} · ${match.date}\n`;
  txt += `${myTeam.flag} ${myTeam.name} ${sc} ${oppTeam.flag} ${oppTeam.name}\n`;
  txt += `我的阵容：A.${mySlots.A.name} B.${mySlots.B.name} C.${mySlots.C.name}\n`;
  txt += `${flavor.emoji} ${flavor.title}`;
  if(flavor.sub) txt += ` ${flavor.sub}`;
  txt += `\n你也来预言 👉 https://m.sports.qq.com/tsportsg/pingpong-game.html`;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>alert('已复制到剪贴板！'));}
  else{prompt('复制分享：',txt);}
}

// ===== Open App =====
function openApp() {
  window.location.href = 'https://sports.qq.com/kbs/m.htm?biz_ref=txtiyugzhcaidan';
}

// ===== INIT =====
renderSchedule();
</script>
